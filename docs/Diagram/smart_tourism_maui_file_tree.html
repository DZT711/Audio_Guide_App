  const projColors = { admin: '#AFA9EC', mobile: '#5DCAA5', shared: '#EF9F27', api: '#F0997B', root: 'transparent' };
  const tagColors = { admin: 'tag-admin', mobile: 'tag-mobile', shared: 'tag-shared', api: 'tag-api', config: 'tag-config' };

  function fileIcon(proj, type) {
    const color = projColors[proj] || '#888';
    if (type === 'dir') return `<svg width="13" height="13" viewBox="0 0 13 13"><path d="M1 3a1 1 0 011-1h3l1.5 1.5H11a1 1 0 011 1V10a1 1 0 01-1 1H2a1 1 0 01-1-1V3z" fill="${color}" opacity="0.9"/></svg>`;
    return `<svg width="11" height="13" viewBox="0 0 11 13"><rect x="0.5" y="0.5" width="10" height="12" rx="2" fill="${color}" opacity="0.5"/><line x1="2.5" y1="4" x2="8.5" y2="4" stroke="${color}" stroke-width="1" opacity="0.8"/><line x1="2.5" y1="6.5" x2="8.5" y2="6.5" stroke="${color}" stroke-width="1" opacity="0.8"/><line x1="2.5" y1="9" x2="6" y2="9" stroke="${color}" stroke-width="1" opacity="0.8"/></svg>`;
  }

  function buildNode(item, depth) {
    const div = document.createElement('div');
    div.className = 'node';
    const row = document.createElement('div');
    row.className = 'row';

    if (item.type === 'dir' && item.children && item.children.length > 0) {
      const chev = document.createElement('span');
      chev.className = 'chevron' + (item.open ? ' open' : '');
      chev.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 3l4 3-4 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      row.appendChild(chev);
    } else {
      const sp = document.createElement('span');
      sp.style.width = '12px'; sp.style.flexShrink = '0';
      row.appendChild(sp);
    }

    const icon = document.createElement('span');
    icon.className = 'icon';
    icon.innerHTML = fileIcon(item.proj, item.type);
    row.appendChild(icon);

    const label = document.createElement('span');
    label.className = 'label' + (depth <= 1 ? ' bold' : '');
    label.textContent = item.name;
    row.appendChild(label);

    if (item.tag) {
      const t = document.createElement('span');
      t.className = 'tag ' + (tagColors[item.tag] || 'tag-config');
      const labels = { admin: 'Admin', mobile: 'Mobile', shared: 'Shared', api: 'API', config: 'config' };
      t.textContent = labels[item.tag] || item.tag;
      row.appendChild(t);
    }

    if (item.desc) {
      const d = document.createElement('span');
      d.className = 'desc';
      d.textContent = '— ' + item.desc;
      row.appendChild(d);
    }

    div.appendChild(row);

    if (item.type === 'dir' && item.children && item.children.length > 0) {
      const child = document.createElement('div');
      child.className = 'indent' + (item.open ? '' : ' hidden');
      item.children.forEach(c => child.appendChild(buildNode(c, depth + 1)));
      div.appendChild(child);
      row.addEventListener('click', () => {
        const open = !child.classList.contains('hidden');
        child.classList.toggle('hidden', open);
        row.querySelector('.chevron').classList.toggle('open', !open);
      });
    }
    return div;
  }

  const root = document.getElementById('tree-root');
  data.forEach(item => root.appendChild(buildNode(item, 0)));
